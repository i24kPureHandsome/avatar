name: Build macOS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npx cross-env VITE_RELEASE=1 npx vite build

      - name: Build macOS arm64
        run: npx electron-builder --mac --arm64 --publish never

      - name: Upload to Gitee Release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          OWNER="Spacetime-Ripple"
          REPO="ai-avatar"
          TAG="latest"
          API="https://gitee.com/api/v5/repos/$OWNER/$REPO/releases"
          
          # Check if release exists
          echo "Checking for existing release..."
          RESP=$(curl -s -w "\n%{http_code}" "$API/tags/$TAG?access_token=$GITEE_TOKEN")
          HTTP_CODE=$(echo "$RESP" | tail -1)
          BODY=$(echo "$RESP" | sed '$d')
          echo "HTTP status: $HTTP_CODE"
          
          if [ "$HTTP_CODE" = "200" ]; then
            RELEASE_ID=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
            echo "Found existing release ID: $RELEASE_ID"
            # Delete old assets
            echo "Deleting old assets..."
            ASSETS=$(echo "$BODY" | python3 -c "import sys,json; [print(a['id']) for a in json.load(sys.stdin).get('assets',[])]")
            for aid in $ASSETS; do
              curl -s -X DELETE "https://gitee.com/api/v5/repos/$OWNER/$REPO/releases/$RELEASE_ID/attach_files/$aid?access_token=$GITEE_TOKEN"
            done
          else
            echo "Creating new release..."
            CREATE_RESP=$(curl -s -X POST "$API" \
              -H "Content-Type: application/json" \
              -d "{\"access_token\":\"$GITEE_TOKEN\",\"tag_name\":\"$TAG\",\"name\":\"macOS 构建\",\"body\":\"最新 macOS 构建\",\"target_commitish\":\"master\"}")
            echo "Create response: $CREATE_RESP"
            RELEASE_ID=$(echo "$CREATE_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
            echo "Created release ID: $RELEASE_ID"
          fi
          
          # Upload all dmg files
          for file in dist-release/*.dmg; do
            filename=$(basename "$file")
            echo "Uploading $filename..."
            UPLOAD_RESP=$(curl -s -X POST "https://gitee.com/api/v5/repos/$OWNER/$REPO/releases/$RELEASE_ID/attach_files" \
              -H "Content-Type: multipart/form-data" \
              -F "access_token=$GITEE_TOKEN" \
              -F "file=@$file")
            echo "Upload response: $UPLOAD_RESP"
          done
          
          echo "Upload complete!"

      - name: Upload artifacts (GitHub backup)
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-build
          path: |
            dist-release/*.dmg
